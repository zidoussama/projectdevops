apiVersion: v1
kind: Service
metadata:
  name: react-service

spec:
  type: NodePort

  selector:
    app: react-app

  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service

spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30081